<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Login</h2>
<div class="login">
    <p>Username:</p><input type="text" id="userName">
    <p>Password:</p><input type="password" id="passWord">
    <button onclick="login()">Login</button>
    <br><br>
    <p id="message"></p>
</div>
<script>
    function login() {
        let username = document.getElementById("userName").value;
        let password = document.getElementById("passWord").value;
        if(username === "Yonatan" && password==="yoni@123") {
            document.getElementById("message").innerHTML ="Login successfully";
        } else if(username === "" || password === "") {
            document.getElementById("message").innerHTML ="please fill all the fields!";
        }
        else {
            document.getElementById("message").innerHTML ="Invalid username or password";
        }
        
    }
</script>
</body>
</html>
