        /* PROJECT SECTION */
.projects {
    margin: 20px;

/* CONTAINER */
.card-container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap; /* 🔥 important for small screens */
}

/* CARD */
.card {
    background-color: white;
    padding: 15px;
    width: 220px;
    border-radius: 12px;

    /* Shadow (depth) */
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    /* Smooth animation */
    transition: 0.3s;
}

/* HOVER EFFECT */
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

/* TITLE */
.card h3 {
    margin-top: 0;
}

/* TEXT */
.card p {
    font-size: 14px;
    color: #333;
}

/* BUTTON */
.card a {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    background-color: blue;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;

    transition: 0.3s;
}

/* BUTTON HOVER */
.card a:hover {
    background-color: darkblue;
}
