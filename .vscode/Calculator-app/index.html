<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

<h2>Simple Calculator</h2>

<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">

<br><br>
<div style="padding:5px; margin:5px;">
<button onclick="addNumbers()">Add</button>
<button onclick="subtractNumbers()">Subtract</button>
<button onclick="productOfNumpers()">Multiplication</button>
<button onclick="dividingNumbers()">division</button>
</div>

<p id="result"></p>

<script>
function addNumbers() {
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    let sum = Number(n1) + Number(n2);

    document.getElementById("result").innerHTML = "Result: " + sum;
}
function subtractNumbers(){
     let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    let subtract = Number(n1) - Number(n2);
    document.getElementById("result").innerHTML = "Result: " + subtract;
}
function productOfNumpers(){
     let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    let product = Number(n1) * Number(n2);
    document.getElementById("result").innerHTML = "Result: " + product;
}
function dividingNumbers(){
    
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

     if(n2>0){
        let division = Number(n1) / Number(n2);
        document.getElementById("result").innerHTML = "Result: " + division;
     } else {
        document.getElementById("result").innerHTML = "Error: Division by zero is not allowed.";
     }
}
</script>
</body>
</html>
