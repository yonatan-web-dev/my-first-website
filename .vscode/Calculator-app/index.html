<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Simple Calculator</h2>
<div class="calculator">
<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">

<br>
<button onclick="addNumbers()">Add</button>
<button onclick="subtractNumbers()">Subtract</button>
<button onclick="productOfNumbers()">Multiplication</button>
<button onclick="dividingNumbers()">Division</button>
<button onclick="clearInputs()">Clear</button>
<p id="result"></p>
</div>
<script>

function getNumbers() {
    let n1 = Number(document.getElementById("num1").value);
    let n2 = Number(document.getElementById("num2").value);
    return [n1, n2];
}

function addNumbers() {
    let [n1, n2] = getNumbers();
    showResult(n1 + n2);
}

function subtractNumbers() {
    let [n1, n2] = getNumbers();
    showResult(n1 - n2);
}

function productOfNumbers() {
    let [n1, n2] = getNumbers();
    showResult(n1 * n2);
}

function dividingNumbers() {
    let [n1, n2] = getNumbers();

    if (n2 != 0) {
        showResult(n1 / n2);
    } else {
        showResult("Error: Cannot divide by zero ❌");
    }
}

function showResult(value) {
    document.getElementById("result").innerHTML = "Result: " + value;
}
function clearInputs() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").innerHTML = "";
}

</script>
