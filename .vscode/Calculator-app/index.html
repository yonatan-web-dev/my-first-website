<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Calculator | Yonatan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <h2>🔢 Calculator</h2>
        
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="memory-display" id="memoryDisplay">M: 0</div>
        
        <div class="buttons">
            <!-- Memory Row -->
            <button class="memory" onclick="memoryClear()">MC</button>
            <button class="memory" onclick="memoryRecall()">MR</button>
            <button class="memory" onclick="memoryAdd()">M+</button>
            <button class="memory" onclick="memorySubtract()">M-</button>
            
            <!-- Row 1 -->
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="operator" onclick="press('/')">÷</button>
            
            <!-- Row 2 -->
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="operator" onclick="press('*')">×</button>
            
            <!-- Row 3 -->
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="operator" onclick="press('-')">−</button>
            
            <!-- Row 4 -->
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button class="operator" onclick="press('+')">+</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <!-- Clear Row -->
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="clear" onclick="backspace()">⌫</button>
        </div>
        
        <!-- History Section -->
        <div class="history">
            <div class="history-header">
                <h3>📜 History</h3>
                <button class="clear-history" onclick="clearHistory()">Clear</button>
            </div>
            <div id="historyList">
                <p class="no-history">No calculations yet</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
